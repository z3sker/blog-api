services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data

  flower:
    build: .
    command: ./scripts/start_flower.sh
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  sqlite_data:
