services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - media_data:/app/media
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
      BLOG_SQLITE_PATH: /app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  flower:
    build: .
    command: ./scripts/start_flower.sh
    env_file:
      - settings/.env
    environment:
      BLOG_REDIS_URL: redis://redis:6379/0
      BLOG_CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  sqlite_data:
  static_data:
  media_data:
