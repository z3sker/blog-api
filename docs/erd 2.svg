<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .title { font: 700 16px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif; fill: #111; }
      .text { font: 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif; fill: #111; }
      .line { stroke: #444; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- User -->
  <rect class="box" x="40" y="50" width="270" height="170" rx="10"/>
  <text class="title" x="60" y="80">User</text>
  <text class="text" x="60" y="110">email (unique)</text>
  <text class="text" x="60" y="132">first_name</text>
  <text class="text" x="60" y="154">last_name</text>
  <text class="text" x="60" y="176">avatar (optional)</text>
  <text class="text" x="60" y="198">date_joined</text>

  <!-- Category -->
  <rect class="box" x="40" y="300" width="270" height="140" rx="10"/>
  <text class="title" x="60" y="330">Category</text>
  <text class="text" x="60" y="360">name (unique)</text>
  <text class="text" x="60" y="382">slug (unique)</text>

  <!-- Tag -->
  <rect class="box" x="420" y="300" width="270" height="140" rx="10"/>
  <text class="title" x="440" y="330">Tag</text>
  <text class="text" x="440" y="360">name (unique)</text>
  <text class="text" x="440" y="382">slug (unique)</text>

  <!-- Post -->
  <rect class="box" x="420" y="50" width="270" height="200" rx="10"/>
  <text class="title" x="440" y="80">Post</text>
  <text class="text" x="440" y="110">author_id (FK → User)</text>
  <text class="text" x="440" y="132">category_id (FK → Category, nullable)</text>
  <text class="text" x="440" y="154">title</text>
  <text class="text" x="440" y="176">slug (unique)</text>
  <text class="text" x="440" y="198">status (draft/published)</text>
  <text class="text" x="440" y="220">created_at, updated_at</text>

  <!-- Comment -->
  <rect class="box" x="800" y="50" width="270" height="170" rx="10"/>
  <text class="title" x="820" y="80">Comment</text>
  <text class="text" x="820" y="110">post_id (FK → Post)</text>
  <text class="text" x="820" y="132">author_id (FK → User)</text>
  <text class="text" x="820" y="154">body</text>
  <text class="text" x="820" y="176">created_at</text>

  <!-- Relationships -->
  <!-- User -> Post -->
  <path class="line" d="M310 110 C360 110 370 110 420 110"/>
  <!-- User -> Comment -->
  <path class="line" d="M310 170 C560 170 570 170 800 170"/>
  <!-- Post -> Comment -->
  <path class="line" d="M690 140 C740 140 750 140 800 140"/>
  <!-- Category -> Post -->
  <path class="line" d="M310 350 C360 350 370 200 420 160"/>
  <!-- Post <-> Tag (M2M) -->
  <path class="line" d="M555 250 C555 275 555 275 555 300"/>
  <text class="text" x="585" y="278">M2M</text>
</svg>
